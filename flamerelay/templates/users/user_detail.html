{% extends "base.html" %}

{% block title %}
  {{ object.username }} | {{ block.super }}
{% endblock title %}
{% block content %}
  <div id="user-detail-root"
       data-username="{{ object.username }}"
       data-current-username="{{ request.user.username }}"
       data-settings-url="{% url 'users:settings' %}"
       data-is-superuser="{{ request.user.is_superuser|lower }}"
       data-admin-url="{% url 'admin:index' %}"></div>
{% endblock content %}

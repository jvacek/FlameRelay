{% extends "base.html" %}

{% block title %}
  Set New Password — LitRoute
{% endblock title %}
{% block content %}
  <div id="password-reset-key-root"
       data-reset-key="{{ request.resolver_match.kwargs.uidb36 }}-{{ request.session._password_reset_key|default:'' }}"
       data-token-fail="{% if token_fail %}true{% else %}false{% endif %}"
       data-login-url="{% url 'account_login' %}"
       data-password-reset-url="{% url 'account_reset_password' %}"></div>
{% endblock content %}

{% load static i18n %}
{% load render_bundle from webpack_loader %}

<!DOCTYPE html>
{% get_current_language as LANGUAGE_CODE %}
<html lang="{{ LANGUAGE_CODE }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>LitRoute</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="Track a lighter's journey across the world." />
    <meta name="author" content="Jonas Vacek" />
    <link rel="icon"
          href="{% static 'images/favicons/litroute.svg' %}"
          type="image/svg+xml" />
    <link rel="apple-touch-icon"
          href="{% static 'images/favicons/apple-touch-icon.png' %}" />
    <link rel="manifest" href="{% static 'images/favicons/site.webmanifest' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:wght@300;400;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
          rel="stylesheet" />
    {% render_bundle 'project' 'css' %}
    {% render_bundle 'vendors' 'js' attrs='defer' %}
    {% render_bundle 'project' 'js' attrs='defer' %}
  </head>
  <body>
    <div id="app-root"></div>
  </body>
</html>

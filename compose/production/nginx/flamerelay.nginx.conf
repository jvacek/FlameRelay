upstream django {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Restore real visitor IP from Cloudflare
# Ranges are maintained in cloudflare_ips.conf — regenerate with update-cloudflare-ips.sh
include /etc/nginx/cloudflare_ips/cloudflare_ips.conf;

server {
    listen 80;
    server_name litroute.com www.litroute.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://litroute.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.litroute.com;

    ssl_certificate     /etc/letsencrypt/live/litroute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/litroute.com/privkey.pem;

    return 301 https://litroute.com$request_uri;
}

server {
    listen 443 ssl;
    server_name litroute.com;

    ssl_certificate     /etc/letsencrypt/live/litroute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/litroute.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-CSRFToken       $http_x_csrftoken;
        proxy_redirect     off;
    }
}
